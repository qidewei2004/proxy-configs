GEOIP,CN,DIRECT
FINAL,FINAL

[URL Rewrite]
^https?://(www\.)?(g|google)\.cn https://www.google.com 302
^(http|https):\/\/(ditu|maps)\.google\.cn https://maps.google.com 302

[MITM]
hostname = -*.icloud.com
ca-passphrase =
ca-p12 =
