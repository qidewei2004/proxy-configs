香港 = smart, policy-regex-filter=(🇭🇰)|港|虚通|HK|Hong, url=http://www.google.com/generate_204, interval=600, tolerance=200, include-all-proxies=1, hidden=1, no-alert=1, icon-url=EMOJI::🇭🇰, persistent=1
台湾 = smart, policy-regex-filter=(🇹🇼)|台|TW|Tai, url=http://www.google.com/generate_204, interval=600, tolerance=200, include-all-proxies=1, hidden=1, no-alert=1, icon-url=EMOJI::🇹🇼
韩国 = smart, policy-regex-filter=(🇰🇷)|韩|韓|首尔|KR|Korea, url=http://www.google.com/generate_204, interval=600, tolerance=200, include-all-proxies=1, hidden=1, no-alert=1, icon-url=EMOJI::🇰🇷
美国 = smart, policy-regex-filter=(🇺🇸)|美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States, url=http://www.google.com/generate_204, interval=600, tolerance=200, include-all-proxies=1, hidden=1, no-alert=1, icon-url=EMOJI::🇺🇸
英国 = smart, policy-regex-filter=^(🇬🇧|英国|英格兰 |GBR|United Kingdom|UK|England|Britain|British).*, url=http://www.google.com/generate_204, interval=600, tolerance=200, include-all-proxies=1, hidden=1, no-alert=1, icon-url=EMOJI::🇬🇧

