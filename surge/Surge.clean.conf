# Region groups
新加坡 = smart, policy-regex-filter=(🇸🇬)|新|SG|Singapore, url=http://www.google.com/generate_204, interval=600, tolerance=200, include-all-proxies=1, hidden=1, no-alert=1, icon-url=EMOJI::🇸🇬
