Emby = smart, update-interval=21600, url=http://cp.cloudflare.com/generate_204, tolerance=50, no-alert=1, hidden=0, include-all-proxies=1, policy-priority=(🇭🇰|香港|港|Hong|HK):0.70;(🇸🇬|新加坡|SG|Singapore):0.80;(🇰🇷|韩国|韩|KR|Korea|South Korea):0.90;(🇹🇼|台湾|台|TW|Tai):0.95, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/04ProxySoft/emby.png
Game = select, 香港, 日本, 美国, 台湾, 新加坡, 韩国, PROXY, DIRECT, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/fmz200/wool_scripts/main/icons/apps/Apple_GameCenter.png
