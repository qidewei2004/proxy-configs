# Reusable Surge profile template.
# No node credentials, subscription URLs, local iCloud paths, CA material, or API passwords are included.
# Add proxies in [Proxy], or attach subscriptions in the Surge UI.

[General]
# Basic
loglevel = warning
ipv6 = false
ipv6-vif = auto
compatibility-mode = 1
skip-proxy = localhost, *.local, *.ts.net, captive.apple.com, guzzoni.apple.com, yunbusiness.ccb.com, www.abchina.com.cn, mobile-bank.psbc.com, login-service.mobile-bank.psbc.com, wxh.wo.cn, 0.0.0.0/8, 10.0.0.0/8, 17.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.0.2.0/24, 192.168.0.0/16, 192.88.99.0/24, 198.18.0.0/15, 198.51.100.0/24, 203.0.113.0/24, 224.0.0.0/4, 240.0.0.0/4, 255.255.255.255/32
exclude-simple-hostnames = true

# DNS
dns-server = 223.5.5.5, 119.29.29.29
encrypted-dns-server = https://dns.alidns.com/dns-query, https://doh.pub/dns-query
hijack-dns = 8.8.8.8:53, 8.8.4.4:53, 1.1.1.1:53, 1.0.0.1:53, 45.14.70.14:53
encrypted-dns-follow-outbound-mode = false
include-all-networks = false
include-local-networks = false
encrypted-dns-skip-cert-verification = false

# Connectivity tests
internet-test-url = http://cp.cloudflare.com/generate_204
proxy-test-url = http://cp.cloudflare.com/generate_204
proxy-test-udp = apple.com@64.6.64.6
test-timeout = 5

# LAN access
allow-wifi-access = false
allow-hotspot-access = false
wifi-access-http-port = 6152
wifi-access-socks5-port = 6153
wifi-assist = true
all-hybrid = false
udp-priority = false

# Advanced
show-error-page-for-reject = true
udp-policy-not-supported-behaviour = REJECT
proxy-restricted-to-lan = false
read-etc-hosts = true
geoip-maxmind-url = https://github.com/Hackl0us/GeoIP2-CN/raw/release/Country.mmdb
use-local-host-item-for-proxy = false
force-http-engine-hosts = *.ott.cibntv.net, 123.59.31.1, 119.18.193.135, 122.14.246.33, 175.102.178.52

# Raw TCP and real IP
always-raw-tcp-hosts = 91.108.*, 5.28.195.*, 149.154.1*, 185.76.151.*, 91.105.1*
always-real-ip = %APPEND% *.msftncsi.com, *.msftconnecttest.com, *.stun.playstation.net, xbox.*.microsoft.com, *.xboxlive.com, *.battlenet.com.cn, *.blzstatic.cn, *.battlenet.com, time.*.com, time.*.gov, time.*.edu.cn, time.*.apple.com, time?.*.com, ntp.*.com, ntp?.*.com, *.time.edu.cn, *.ntp.org.cn, *.pool.ntp.org, time*.cloud.tencent.com, ntp?.aliyun.com, stun.*, *.stun.twilio.com, *.turn.twilio.com, *.srv.nintendo.net, music.163.com, *.music.163.com, *.126.net, *.kuwo.cn, y.qq.com, *.y.qq.com, streamoc.music.tc.qq.com, mobileoc.music.tc.qq.com, isure.stream.qqmusic.qq.com, dl.stream.qqmusic.qq.com, aqqmusic.tc.qq.com, amobile.music.tc.qq.com, *.music.migu.cn, music.migu.cn, songsearch.kugou.com, trackercdn.kugou.com, api.joox.com, joox.com

[Proxy]
# Add your own nodes here, or manage subscriptions in the Surge UI.

[Proxy Group]
# Entry groups
PROXY = select, Auto, 香港, 台湾, 新加坡, 日本, 美国, 韩国, DIRECT, no-alert=0, hidden=0, include-all-proxies=1, icon-url=B1::Maps::Earth Globe
Auto = smart, hidden=0, update-interval=10800, no-alert=1, include-all-proxies=1, policy-regex-filter=^(?!.*(官网|套餐|重置|剩余|导航|通知|更新|刷新|付费解锁|免费用户|防失联|电报)).*, policy-priority=(🇭🇰|香港|港|Hong|HK):0.70;(🇸🇬|新加坡|SG|Singapore):0.80;(🇹🇼|台湾|台|TW|Tai):0.90;(🇯🇵|日本|日|JP|Japan|东京|大阪):0.95, icon-url=B1::Photo and Video::Flash Auto
